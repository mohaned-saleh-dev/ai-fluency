services:
  - type: web
    name: newsintel
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn news_agent.dashboard:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL_NAME
        value: gemini-2.5-flash
      - key: PYTHON_VERSION
        value: "3.11"
