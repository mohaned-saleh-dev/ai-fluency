# Blueprint for AiQ CSuite only (Flask). Apply in Render: New → Blueprint → paste this file,
# or merge this service into your main render.yaml.
#
# After deploy: Dashboard → your service → Environment → add secrets:
#   GOOGLE_API_KEY or GEMINI_API_KEY   (required for Gemini)
#   AIQ_ADMIN_SECRET                   (required for /admin)
# Optional: AIQ_INTERVIEWER_REPAIR=1   (second Gemini call per turn — needs high upstream timeout)
#
# SQLite lives on ephemeral disk — each deploy / new instance starts with an EMPTY database
# unless you store the DB on a persistent disk. Admin lists sessions from whatever file
# AIQ_SQLITE_PATH points at (default: aiq_csuite/instance/aiq_csuite.db inside the container).
#
# Fix (paid instances): Dashboard → Disks → attach disk, then set e.g.
#   AIQ_SQLITE_PATH=/var/data/aiq_csuite.db
# Or add to this blueprint (paid plans support disk:):
#   disk:
#     name: aiq-sqlite
#     mountPath: /var/data
#     sizeGB: 1
#   envVars:
#     - key: AIQ_SQLITE_PATH
#       value: /var/data/aiq_csuite.db
# https://render.com/docs/disks

services:
  - type: web
    name: ai-fluency-aiq
    runtime: docker
    region: oregon
    plan: free
    rootDir: aiq_csuite
    dockerfilePath: Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: AIQ_ADMIN_SECRET
        sync: false
      # Optional: absolute path on a persistent disk (see comment block above).
      # - key: AIQ_SQLITE_PATH
      #   value: /var/data/aiq_csuite.db
